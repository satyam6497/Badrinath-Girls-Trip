kind = "web"
previewPath = "/"
title = "Girls Trip to Badrinath"
version = "1.0.0"
id = "artifacts/badrinath-trip"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19463

[services.development]
run = "pnpm --filter @workspace/badrinath-trip run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/badrinath-trip", "run", "build" ]
publicDir = "artifacts/badrinath-trip/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19463"
BASE_PATH = "/"
